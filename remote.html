<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<meta name="theme-color" content="#1a1815">
<title>stage remote</title>
<style>
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body { height: 100%; }
  body {
    margin: 0; background: #1a1815; color: #f0eee6;
    font-family: "JetBrains Mono", ui-monospace, SFMono-Regular, Menlo, monospace;
    display: flex; flex-direction: column;
    user-select: none; -webkit-user-select: none; touch-action: manipulation;
    overscroll-behavior: none;
  }
  .accent { color: #d97757; }

  /* ---- pairing view ---- */
  #pair { flex: 1; display: flex; flex-direction: column; justify-content: center; padding: 2rem; gap: 1rem; }
  #pair.hide { display: none; }
  #pair h1 { font-size: 1.15rem; margin: 0; font-weight: 600; }
  #pair p { color: #8a8678; margin: 0; font-size: .8rem; line-height: 1.5; }
  #pair input {
    background: #26241d; border: 1px solid #545146; color: #f0eee6;
    font: inherit; font-size: 1.5rem; letter-spacing: .25em; text-align: center;
    padding: .6rem; border-radius: 10px; width: 100%;
    text-transform: lowercase; autocapitalize: none;
  }
  #pair button {
    background: #d97757; border: 0; color: #1a1815; font: inherit; font-weight: 700;
    font-size: 1.05rem; padding: .9rem; border-radius: 10px;
  }

  /* ---- control view ---- */
  #ctl { flex: 1; display: none; flex-direction: column; min-height: 0; }
  #ctl.show { display: flex; }
  header {
    display: flex; align-items: center; gap: .55rem;
    padding: .7rem 1rem .4rem; color: #8a8678; font-size: .78rem;
  }
  #dot { width: .55rem; height: .55rem; border-radius: 50%; background: #6b675c; flex: none; }
  #dot.ok { background: #7ec46a; }
  #scene {
    color: #f0eee6; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    background: none; border: 0; font: inherit; padding: 0;
    border-bottom: 1px dotted #545146;
  }
  #scene::after { content: " ▾"; color: #8a8678; }

  /* ---- goto list (tap the scene name) ---- */
  #list {
    position: fixed; inset: 0; z-index: 50; display: none;
    background: #1a1815; flex-direction: column;
  }
  #list.show { display: flex; }
  #listhead {
    display: flex; align-items: center; justify-content: space-between;
    padding: .8rem 1rem; color: #8a8678; font-size: .8rem;
    border-bottom: 1px solid #2e2c25; flex: none;
  }
  #listclose { background: none; border: 0; color: #d97757; font: inherit; font-size: .85rem; }
  #listrows { flex: 1; overflow-y: auto; -webkit-overflow-scrolling: touch; }
  .lrow {
    display: flex; gap: .7rem; align-items: baseline;
    padding: .65rem 1rem; border-bottom: 1px solid #23211b;
    font-size: .85rem;
  }
  .lrow .ln { color: #8a8678; min-width: 1.8em; text-align: right; flex: none; }
  .lrow .lid { min-width: 6.5em; flex: none; }
  .lrow .lc { color: #8a8678; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; flex: 1; }
  .lrow.m .lid { color: #d97757; font-weight: 700; }
  .lrow.cur { background: #3a2c25; }
  .lrow:active { background: #2e2c25; }
  #unpair { margin-left: auto; color: #8a8678; background: none; border: 0;
            font: inherit; font-size: .72rem; text-decoration: underline; flex: none; }
  #notes { flex: 1; overflow-y: auto; padding: .3rem 1rem .5rem; min-height: 0; }
  #gobbo { font-size: 1rem; line-height: 1.5; white-space: pre-wrap; }
  #nextlabel { display: none; color: #8a8678; font-size: .7rem; margin-top: .7rem; }
  #nextlabel.show { display: block; }
  #nextthumb {
    display: none; width: 100%; max-height: 30vh; object-fit: contain;
    margin-top: .25rem; border: 1px solid #2e2c25; border-radius: 8px;
    background: #000;
  }
  #nextthumb.show { display: block; }
  #fb {
    height: 1.15rem; margin: 0 .6rem; flex: none;
    font-size: .75rem; line-height: 1.15rem; text-align: center;
    color: transparent; transition: color .15s;
  }
  #fb.sent { color: #8a8678; }
  #fb.ok { color: #7ec46a; }
  #fb.noack { color: #e05a4e; }
  #buttons { display: flex; flex-direction: column; height: 30vh; padding: .3rem .6rem .6rem; gap: .6rem; flex: none; }
  button.nav {
    border: 3px solid transparent; border-radius: 14px; font: inherit; font-weight: 700;
    transition: border-color .15s, filter .15s;
  }
  button.nav:active { filter: brightness(1.3); }
  /* feedback ack ANCHE sul bottone: iOS Safari non ha la vibrazione web,
     quindi il bottone stesso lampeggia (più visibile della riga di testo) */
  button.nav.sent { filter: brightness(.8); }
  button.nav.ok { border-color: #7ec46a; filter: none; }
  button.nav.bad { border-color: #e05a4e; filter: none; }
  #prev { flex: 1; background: #26241d; color: #8a8678; font-size: .95rem; }
  #next { flex: 3; background: #d97757; color: #1a1815; font-size: 1.6rem; letter-spacing: .1em; }
</style>
</head>
<body>

<div id="pair">
  <h1>stage remote <span class="accent">· pairing</span></h1>
  <p>On the stage laptop press <b>p</b>: a channel appears. Type it here
     (or open the link with the #channel in it).</p>
  <input id="token" inputmode="text" autocomplete="off" autocapitalize="none"
         spellcheck="false" placeholder="channel">
  <button id="connect">Connect</button>
  <p id="pairerr" style="color:#d97757"></p>
</div>

<div id="ctl">
  <header>
    <div id="dot"></div>
    <button id="scene">waiting for the deck…</button>
    <button id="unpair">change channel</button>
  </header>
  <div id="notes">
    <div id="gobbo"></div>
    <div id="nextlabel">next</div>
    <img id="nextthumb" alt="">
  </div>
  <div id="fb"></div>
  <div id="buttons">
    <button class="nav" id="prev">← back</button>
    <button class="nav" id="next">NEXT</button>
  </div>
</div>

<div id="list">
  <div id="listhead">
    <span>go to scene · tap to jump</span>
    <button id="listclose">close</button>
  </div>
  <div id="listrows"></div>
</div>

<script>
var RELAY = "https://ntfy.sh";
var es = null, token = "";

function $(id) { return document.getElementById(id); }

function setConnected(ok) { $("dot").classList.toggle("ok", !!ok); }

function showCtl(yes) {
  $("pair").classList.toggle("hide", yes);
  $("ctl").classList.toggle("show", yes);
}

function publish(msg) {
  if (!token) return;
  fetch(RELAY + "/lzst-" + token, { method: "POST", body: msg }).catch(function () {});
  if (navigator.vibrate) navigator.vibrate(12);
}

/* ---- command feedback: every nav command carries a "#<seq>"; the deck
   acks it on the state topic BEFORE executing. Tap -> "sent…", ack ->
   "✓ received" + short buzz, no ack within ACK_TIMEOUT -> red line + long
   buzz: ONLY then a second tap makes sense (anti double-tap). ---- */
var ACK_TIMEOUT = 2500;
var seqCounter = 0, pendingSeq = null, ackTimer = null, fbTimer = null;
var pendingBtn = null;   // the tapped button also flashes (no vibration on iOS)

function setFb(cls, text) {
  var el = $("fb");
  el.className = cls || "";
  el.textContent = text || "";
}

function setBtn(cls) {
  if (!pendingBtn) return;
  pendingBtn.classList.remove("sent", "ok", "bad");
  if (cls) pendingBtn.classList.add(cls);
}

function sendCmd(cmd, btn) {
  var q = String(++seqCounter);
  pendingSeq = q;
  if (pendingBtn) pendingBtn.classList.remove("sent", "ok", "bad");
  pendingBtn = btn || null;
  clearTimeout(ackTimer); clearTimeout(fbTimer);
  setFb("sent", "→ sent…");
  setBtn("sent");
  publish(cmd + "#" + q);
  ackTimer = setTimeout(function () {
    if (pendingSeq === q) {
      pendingSeq = null;
      setFb("noack", "✗ no ack from the deck — check, then tap again");
      setBtn("bad");
      if (navigator.vibrate) navigator.vibrate(250);
    }
  }, ACK_TIMEOUT);
}

function onAck(msg) {
  if (msg.q !== pendingSeq) return;   // stale ack (late or duplicate)
  pendingSeq = null;
  clearTimeout(ackTimer);
  setFb("ok", "✓ received");
  setBtn("ok");
  if (navigator.vibrate) navigator.vibrate(35);
  fbTimer = setTimeout(function () { setFb("", ""); setBtn(null); }, 900);
}

var curIndex = 0;          // 1-based index of the scene on the deck (0 = gate)
var sceneList = [];        // assembled from chunked "list" messages
var listParts = {}, listTot = null;

function onState(st) {
  curIndex = st.i || 0;
  $("scene").textContent = st.id + (st.i > 0 ? " · " + st.i + "/" + st.n : "");
  $("gobbo").textContent = st.gobbo || "";
  // anteprima della prossima scena: thumbs/<id>.jpg accanto al companion
  // (generati con gen_thumbs.js; se mancano, l'immagine resta nascosta)
  var th = $("nextthumb");
  if (st.nextId) th.src = "thumbs/" + encodeURIComponent(st.nextId) + ".jpg";
  else { th.removeAttribute("src"); th.classList.remove("show"); $("nextlabel").classList.remove("show"); }
  if ($("list").classList.contains("show")) renderList();
}
$("nextthumb").onload = function () {
  this.classList.add("show");
  $("nextlabel").classList.add("show");
};
$("nextthumb").onerror = function () {
  this.classList.remove("show");
  $("nextlabel").classList.remove("show");
};

function onListChunk(msg) {
  listTot = msg.tot;
  listParts[msg.p] = msg.s || [];
  var have = Object.keys(listParts).length;
  if (listTot != null && have >= listTot) {
    var all = [];
    for (var p = 0; p < listTot; p++) all = all.concat(listParts[p] || []);
    sceneList = all;
    if ($("list").classList.contains("show")) renderList();
  }
}

function renderList() {
  var box = $("listrows");
  box.innerHTML = "";
  if (!sceneList.length) {
    var d = document.createElement("div");
    d.className = "lrow";
    d.textContent = "waiting for the scene list…";
    box.appendChild(d);
    return;
  }
  sceneList.forEach(function (s) {
    var row = document.createElement("div");
    row.className = "lrow" + (s.m ? " m" : "") + (s.i === curIndex ? " cur" : "");
    var n = document.createElement("span"); n.className = "ln"; n.textContent = s.i;
    var id = document.createElement("span"); id.className = "lid"; id.textContent = s.id;
    var c = document.createElement("span"); c.className = "lc"; c.textContent = s.c || "";
    row.appendChild(n); row.appendChild(id); row.appendChild(c);
    row.onclick = function () {
      sendCmd("goto:" + s.i);
      closeList();
    };
    box.appendChild(row);
  });
  var cur = box.querySelector(".lrow.cur");
  if (cur && cur.scrollIntoView) cur.scrollIntoView({ block: "center" });
}

function openList() {
  if (!sceneList.length) publish("ping");   // ask the deck for the list again
  renderList();
  $("list").classList.add("show");
}
function closeList() { $("list").classList.remove("show"); }

function connect() {
  if (es) { es.close(); es = null; }
  // since=30m: replay the recent backlog so a late-joining phone catches the
  // last published state; messages arrive oldest -> newest, last one wins
  es = new EventSource(RELAY + "/lzst-" + token + "-s/sse?since=30m");
  es.onopen = function () { setConnected(true); publish("ping"); };
  es.onerror = function () { setConnected(false); };  // ES reconnects alone
  es.onmessage = function (ev) {
    try {
      var msg = JSON.parse(JSON.parse(ev.data).message);
      if (msg.t === "list") onListChunk(msg);
      else if (msg.t === "ack") onAck(msg);
      else onState(msg);
    } catch (e) {}
  };
}

function pairWith(t) {
  t = (t || "").trim().toLowerCase().replace(/^#/, "");
  if (!/^[a-z0-9]{4,20}$/.test(t)) {
    $("pairerr").textContent = "invalid channel";
    return;
  }
  token = t;
  try { localStorage.setItem("stageRemotePhoneToken", t); } catch (e) {}
  $("pairerr").textContent = "";
  showCtl(true);
  connect();
}

$("connect").onclick = function () { pairWith($("token").value); };
$("token").addEventListener("keydown", function (e) {
  if (e.key === "Enter") pairWith($("token").value);
});
$("unpair").onclick = function () {
  if (es) { es.close(); es = null; }
  token = "";
  try { localStorage.removeItem("stageRemotePhoneToken"); } catch (e) {}
  setConnected(false);
  showCtl(false);
};

$("next").onclick = function () { sendCmd("next", this); };
$("prev").onclick = function () { sendCmd("prev", this); };
$("scene").onclick = openList;
$("listclose").onclick = closeList;

// keep the phone awake while driving the show
var wakeLock = null;
function lock() {
  if (!("wakeLock" in navigator)) return;
  navigator.wakeLock.request("screen").then(function (l) { wakeLock = l; }).catch(function () {});
}
document.addEventListener("visibilitychange", function () {
  if (document.visibilityState === "visible") { lock(); if (token && es && es.readyState === 2) connect(); }
});
lock();

// auto-pair: #token in the URL wins, then the saved one
var initial = (location.hash || "").replace("#", "").trim()
  || (function () { try { return localStorage.getItem("stageRemotePhoneToken") || ""; } catch (e) { return ""; } })();
if (initial) { $("token").value = initial; pairWith(initial); }
</script>
</body>
</html>
